<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Upload</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            max-width: 900px;
            margin: auto;
        }
        .resume-card {
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            font-weight: bold;
            background-color: #007bff;
            color: white;
        }
        .btn-assessment {
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container text-center">
        <h2 class="mb-4">Upload Resumes</h2>

        <form id="uploadForm" enctype="multipart/form-data" class="mb-4">
            <input type="file" id="resumeInput" name="resumes" multiple accept=".pdf,.docx" class="form-control">
            <button type="submit" class="btn btn-primary mt-3">Upload</button>
        </form>

        <div id="result" class="row"></div>
    </div>

    <div class="container">
        <div class="row">
            <!--Left Side-->
            <div class="col">
                
            </div>
            <!--Right Side-->
            <div class="col">

            </div>
        </div>
    </div>

    <script>
        $("#uploadForm").on("submit", function(e) {
            e.preventDefault();

            let formData = new FormData();
            let files = $("#resumeInput")[0].files;

            if (files.length === 0) {
                alert("Please select at least one file.");
                return;
            }

            for (let i = 0; i < files.length; i++) {
                formData.append("resumes", files[i]);
            }

            $.ajax({
                url: "/upload",
                type: "POST",
                data: formData,
                contentType: false,
                processData: false,
                success: function(response) {
                    let html = "";
                    
                    response.forEach(resume => {
                        html += `
                            <div class="col-md-6">
                                <div class="card resume-card">
                                    <div class="card-header">${resume.filename}</div>
                                    <div class="card-body">
                                        <p><strong>Age:</strong> ${resume.extracted_info.age}</p>
                                        <p><strong>Gender:</strong> ${resume.extracted_info.gender}</p>
                                        <p><strong>Address:</strong> ${resume.extracted_info.address}</p>
                                        <p><strong>Skills:</strong> ${resume.extracted_info.skills}</p>
                                        <p><strong>Education:</strong> ${resume.extracted_info.education}</p>
                                        <p><strong>Experience:</strong> ${resume.extracted_info.experience}</p>
                                        <p><strong>Certification:</strong> ${resume.extracted_info.certification}</p>
                                        <button class="btn btn-success btn-assessment" onclick="viewAssessment('${resume.filename}')">View Assessment</button>
                                    </div>
                                </div>
                            </div>`;
                    });

                    $("#result").html(html);
                },
                error: function() {
                    alert("Error uploading resumes.");
                }
            });
        });

        function viewAssessment(filename) {
            alert("View Assessment for: " + filename);
            // Later, redirect or fetch assessment results dynamically
        }
    </script>

</body>
</html>
