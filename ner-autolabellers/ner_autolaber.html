<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Simple NER Labeler</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 20px;
                line-height: 1.6;
            }
            .container {
                max-width: 1000px;
                margin: 0 auto;
            }
            h1 {
                color: #333;
            }
            textarea {
                width: 100%;
                height: 150px;
                margin-bottom: 10px;
                padding: 8px;
                border: 1px solid #ddd;
            }
            button {
                padding: 8px 12px;
                background-color: #4caf50;
                color: white;
                border: none;
                cursor: pointer;
                margin-right: 5px;
                margin-bottom: 10px;
            }
            button:hover {
                background-color: #45a049;
            }
            .entity-buttons {
                margin-bottom: 15px;
            }
            .entity-button {
                margin-right: 5px;
                margin-bottom: 5px;
            }
            .selected {
                border: 2px solid black;
            }
            .token {
                display: inline-block;
                margin: 2px;
                padding: 2px 5px;
                border-radius: 3px;
                cursor: pointer;
            }
            .token:hover {
                background-color: #f0f0f0;
            }
            .text-container {
                border: 1px solid #ddd;
                padding: 10px;
                margin-bottom: 15px;
                background-color: #f9f9f9;
                min-height: 100px;
            }
            .shortcuts {
                background-color: #f0f0f0;
                padding: 10px;
                margin-bottom: 15px;
                border-radius: 5px;
            }
            .export-area {
                width: 100%;
                height: 150px;
                margin-top: 10px;
            }

            /* Entity colors */
            .AGE {
                background-color: #ff5733;
                color: white;
            }
            .GENDER {
                background-color: #33ff57;
                color: black;
            }
            .ADDRESS {
                background-color: #3357ff;
                color: white;
            }
            .SOFT_SKILL {
                background-color: #ff33a8;
                color: white;
            }
            .HARD_SKILL {
                background-color: #33a8ff;
                color: white;
            }
            .EDUCATION_LEVEL {
                background-color: #a833ff;
                color: white;
            }
            .COURSE {
                background-color: #ffa833;
                color: black;
            }
            .EXPERIENCE {
                background-color: #33ffa8;
                color: black;
            }
            .CERTIFICATION {
                background-color: #a8ff33;
                color: black;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Simple NER Labeler</h1>

            <div class="shortcuts">
                <p><strong>Keyboard Shortcuts:</strong></p>
                <p>
                    1-9: Select entity type | Click on words to label | Enter:
                    Finish labeling | Esc: Cancel
                </p>
            </div>

            <div>
                <textarea
                    id="textInput"
                    placeholder="Paste your resume text here..."
                ></textarea>
                <button id="processBtn">Process Text</button>
                <button id="clearBtn">Clear All</button>
            </div>

            <div class="entity-buttons">
                <button class="entity-button" data-entity="AGE" data-key="1">
                    1: AGE
                </button>
                <button class="entity-button" data-entity="GENDER" data-key="2">
                    2: GENDER
                </button>
                <button
                    class="entity-button"
                    data-entity="ADDRESS"
                    data-key="3"
                >
                    3: ADDRESS
                </button>
                <button
                    class="entity-button"
                    data-entity="SOFT_SKILL"
                    data-key="4"
                >
                    4: SOFT_SKILL
                </button>
                <button
                    class="entity-button"
                    data-entity="HARD_SKILL"
                    data-key="5"
                >
                    5: HARD_SKILL
                </button>
                <button
                    class="entity-button"
                    data-entity="EDUCATION_LEVEL"
                    data-key="6"
                >
                    6: EDUCATION_LEVEL
                </button>
                <button class="entity-button" data-entity="COURSE" data-key="7">
                    7: COURSE
                </button>
                <button
                    class="entity-button"
                    data-entity="EXPERIENCE"
                    data-key="8"
                >
                    8: EXPERIENCE
                </button>
                <button
                    class="entity-button"
                    data-entity="CERTIFICATION"
                    data-key="9"
                >
                    9: CERTIFICATION
                </button>
            </div>

            <div id="textContainer" class="text-container"></div>

            <div>
                <button id="exportBtn">Export (CoNLL Format)</button>
                <textarea
                    id="exportOutput"
                    class="export-area"
                    readonly
                ></textarea>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const textInput = document.getElementById("textInput");
                const processBtn = document.getElementById("processBtn");
                const clearBtn = document.getElementById("clearBtn");
                const textContainer = document.getElementById("textContainer");
                const exportBtn = document.getElementById("exportBtn");
                const exportOutput = document.getElementById("exportOutput");
                const entityButtons =
                    document.querySelectorAll(".entity-button");

                let currentEntityType = null;
                let tokens = [];

                // Process text button
                processBtn.addEventListener("click", function () {
                    const text = textInput.value.trim();
                    if (!text) {
                        alert("Please enter some text to process.");
                        return;
                    }

                    // Simple tokenization (split by whitespace and punctuation)
                    tokens = [];
                    const rawTokens = text
                        .split(/(\s+|[,.!?;:()[\]{}'""-])/g)
                        .filter((token) => token !== "");

                    rawTokens.forEach((token, index) => {
                        tokens.push({
                            id: index,
                            text: token,
                            entity: null,
                            isWhitespace: /^\s+$/.test(token),
                        });
                    });

                    renderTokens();
                });

                // Clear all button
                clearBtn.addEventListener("click", function () {
                    textInput.value = "";
                    textContainer.innerHTML = "";
                    exportOutput.value = "";
                    tokens = [];
                    currentEntityType = null;
                    updateSelectedEntityButton();
                });

                // Entity buttons
                entityButtons.forEach((button) => {
                    button.addEventListener("click", function () {
                        currentEntityType = this.dataset.entity;
                        updateSelectedEntityButton();
                    });
                });

                // Export button
                exportBtn.addEventListener("click", function () {
                    if (tokens.length === 0) {
                        alert("No labeled data to export.");
                        return;
                    }

                    exportOutput.value = exportToCoNLL();
                });

                // Keyboard shortcuts
                document.addEventListener("keydown", function (e) {
                    // Number keys 1-9 for entity selection
                    if (e.key >= "1" && e.key <= "9") {
                        const entityIndex = parseInt(e.key) - 1;
                        if (entityIndex < entityButtons.length) {
                            const button = entityButtons[entityIndex];
                            currentEntityType = button.dataset.entity;
                            updateSelectedEntityButton();
                        }
                    }
                    // Enter key to finish labeling
                    else if (e.key === "Enter") {
                        // Just for feedback that Enter was pressed
                        console.log("Enter pressed - labeling finished");
                    }
                    // Escape key to cancel current selection
                    else if (e.key === "Escape") {
                        currentEntityType = null;
                        updateSelectedEntityButton();
                    }
                });

                // Render tokens in the text container
                function renderTokens() {
                    textContainer.innerHTML = "";

                    tokens.forEach((token) => {
                        if (token.isWhitespace) {
                            // For whitespace tokens, just add the whitespace
                            const spaceNode = document.createTextNode(
                                token.text
                            );
                            textContainer.appendChild(spaceNode);
                        } else {
                            // For non-whitespace tokens, create clickable spans
                            const tokenSpan = document.createElement("span");
                            tokenSpan.className = "token";
                            tokenSpan.textContent = token.text;
                            tokenSpan.dataset.id = token.id;

                            // If token has an entity, add styling
                            if (token.entity) {
                                tokenSpan.classList.add(token.entity);
                                tokenSpan.title = token.entity;
                            }

                            // Add click event for labeling
                            tokenSpan.addEventListener("click", function () {
                                if (!currentEntityType) {
                                    alert(
                                        "Please select an entity type first."
                                    );
                                    return;
                                }

                                // If token already has this entity, remove it
                                if (token.entity === currentEntityType) {
                                    token.entity = null;
                                }
                                // If token has a different entity or no entity, set it to current
                                else {
                                    token.entity = currentEntityType;
                                }

                                renderTokens();
                            });

                            textContainer.appendChild(tokenSpan);
                        }
                    });
                }

                // Update the selected entity button
                function updateSelectedEntityButton() {
                    entityButtons.forEach((button) => {
                        if (button.dataset.entity === currentEntityType) {
                            button.classList.add("selected");
                        } else {
                            button.classList.remove("selected");
                        }
                    });
                }

                // Export to CoNLL format
                function exportToCoNLL() {
                    let output = "";
                    let tokenId = 1;

                    tokens.forEach((token) => {
                        if (token.isWhitespace) {
                            // Skip whitespace tokens in CoNLL format
                            return;
                        }

                        // If token has a newline, add an empty line
                        if (token.text.includes("\n")) {
                            output += "\n";
                            return;
                        }

                        const entityTag = token.entity ? token.entity : "O";
                        // Format: token_id token_text entity_tag
                        output += `${tokenId}\t${token.text}\t${entityTag}\n`;
                        tokenId++;
                    });

                    return output;
                }
            });
        </script>
    </body>
</html>
